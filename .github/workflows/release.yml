name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 1

jobs:
  test:
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - name: Test + Lint
        run: |
          source ~/.cargo/env
          cargo test --release
          cargo clippy --release -- -D warnings
          cargo fmt --check

  build-linux:
    needs: test
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: source ~/.cargo/env && cargo zigbuild --release --target x86_64-unknown-linux-musl
      - name: Package
        run: |
          cd target/x86_64-unknown-linux-musl/release
          tar czf ../../../amnezia-xray-admin-x86_64-unknown-linux-musl.tar.gz amnezia-xray-admin
          cd ../../..
          shasum -a 256 amnezia-xray-admin-x86_64-unknown-linux-musl.tar.gz > amnezia-xray-admin-x86_64-unknown-linux-musl.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: amnezia-xray-admin-x86_64-unknown-linux-musl
          path: |
            amnezia-xray-admin-x86_64-unknown-linux-musl.tar.gz
            amnezia-xray-admin-x86_64-unknown-linux-musl.tar.gz.sha256

  build-macos:
    needs: test
    runs-on: [self-hosted, macOS]
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: source ~/.cargo/env && cargo build --release --target aarch64-apple-darwin
      - name: Package
        run: |
          cd target/aarch64-apple-darwin/release
          tar czf ../../../amnezia-xray-admin-aarch64-apple-darwin.tar.gz amnezia-xray-admin
          cd ../../..
          shasum -a 256 amnezia-xray-admin-aarch64-apple-darwin.tar.gz > amnezia-xray-admin-aarch64-apple-darwin.tar.gz.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: amnezia-xray-admin-aarch64-apple-darwin
          path: |
            amnezia-xray-admin-aarch64-apple-darwin.tar.gz
            amnezia-xray-admin-aarch64-apple-darwin.tar.gz.sha256

  publish:
    needs: [build-linux, build-macos]
    runs-on: [self-hosted, macOS]
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            amnezia-xray-admin-*.tar.gz
            amnezia-xray-admin-*.tar.gz.sha256

      - name: Extract Linux binary for Docker
        run: |
          tar xzf amnezia-xray-admin-x86_64-unknown-linux-musl.tar.gz
          chmod +x amnezia-xray-admin

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build --platform linux/amd64 -t ghcr.io/${{ github.repository }}:latest -t ghcr.io/${{ github.repository }}:${{ github.ref_name }} .
          docker push ghcr.io/${{ github.repository }}:latest
          docker push ghcr.io/${{ github.repository }}:${{ github.ref_name }}
